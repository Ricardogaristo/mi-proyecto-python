<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestor Profesional Ricardo Garisto</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        body {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            transition: all 0.3s ease;
        }
        .table-responsive {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            font-size: 10px;
        }
        .navbar {
            background: linear-gradient(90deg, #212529, #343a40);
        }

        .navbar-brand {
            letter-spacing: 1px;
            font-size: 1.2rem;
        }

        .nav-link {
            transition: 0.3s;
        }

        .nav-link:hover {
            color: #ffc107 !important;
        }

        .main-card {
            border-radius: 15px;
            border: none;
        }

        .export-btn {
            border-radius: 50px;
            font-weight: 500;
        }

        .dark-mode {
            background: #dfdfdf !important;
            color: #f8f9fa !important;
        }

        .dark-mode .card {
            background-color: #3f3f3f;
            color: white;
        }

        .dark-mode .navbar {
            background: linear-gradient(90deg, #000000, #1c1c1c);
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark shadow">
    <div class="container-fluid">

        <a class="navbar-brand fw-bold" href="/">
            📋 Gestor Tareas
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav me-auto">

                <li class="nav-item">
                    <a class="nav-link" href="/">🏠 Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/dashboard">📊 Dashboard</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/admin">⚙ Panel Admin</a>
                </li>

            </ul>

            <button onclick="toggleDark()" 
                    class="btn btn-outline-light btn-sm me-3">
                🌙
            </button>

            <div class="d-flex align-items-center">
                <span class="text-white me-3">
                    👤 {{ session['user'] }}
                </span>

                <a href="/logout" class="btn btn-danger btn-sm">
                    Cerrar Sesión
                </a>
            </div>

        </div>
    </div>
</nav>

<!-- CONTENIDO PRINCIPAL -->
<div class="container my-5">

    <div class="card shadow-lg main-card animate__animated animate__fadeInUp">
        <div class="card-body p-4">

            {% block content %}{% endblock %}

            <div class="text-end mt-4">
                <a href="/exportar" class="btn btn-success export-btn">
                    📥 Exportar Excel
                </a>
            </div>

        </div>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.getElementById("buscador")?.addEventListener("keyup", function () {
    let filtro = this.value.toLowerCase();
    let filas = document.querySelectorAll("tbody tr");

    filas.forEach(fila => {
        let texto = fila.innerText.toLowerCase();
        fila.style.display = texto.includes(filtro) ? "" : "none";
    });
});
</script>

<script>
function toggleDark() {
    document.body.classList.toggle("dark-mode");
}
</script>

</body>
</html>
