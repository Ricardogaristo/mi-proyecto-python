<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - Gestor de Tareas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1cc88a, #4e73df); height: 100vh; display: flex; justify-content: center; align-items: center; }
        .card { width: 100%; max-width: 400px; border-radius: 15px; }
        .header { background: #1cc88a; color: white; text-align: center; padding: 20px; border-radius: 15px 15px 0 0; }
    </style>
</head>
<body>
<div class="card shadow">
    <div class="header"><h4>📝 Crear Cuenta</h4></div>
    <div class="card-body p-4">
        {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Nombre de Usuario</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Correo Electrónico</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-success w-100">Registrarse</button>
        </form>
    </div>
    <div class="card-footer text-center">
        <a href="/login">¿Ya tienes cuenta? Inicia sesión</a>
    </div>
</div>
</body>
</html>
